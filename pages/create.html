<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Create Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../style.css">

</head>

<body>

  <main class="create-screen">

    <h1 class="create-title">Create Tracker</h1>

    <input
      id="tracker-name"
      type="text"
      placeholder="Tracker Name"
    >

    <input
      id="tracker-days"
      type="number"
      min="1"
      max="365"
      placeholder="1 - 365 days"
    >

    <div class="colors-container">

      <h2 class="section-title">colors and meaning: </h2>

    </div>

    <button id="add-color-btn">+ Add Color</button>

    <button id="create-tracker-btn">Create Tracker</button>

  </main>

  <script src="script.js"></script>

</body>
</html>
